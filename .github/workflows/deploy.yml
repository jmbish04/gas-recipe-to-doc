name: Deploy Apps Script

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using LTS for better stability with clasp
          cache: 'npm'

      - name: Install Dependencies
        run: npm install -g @google/clasp

      - name: Inject and Flatten Clasp Auth
        run: |
          echo "$RAW_JSON" | jq '{
            token: .tokens.default,
            oauth2ClientSettings: {
              clientId: .tokens.default.client_id,
              clientSecret: .tokens.default.client_secret,
              redirectUri: "http://localhost"
            },
            isLocalCreds: false
          }' > ~/.clasprc.json
        env:
          RAW_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push to Apps Script
        run: clasp push -f

      - name: Deploy Version
        run: |
          clasp deploy --description "Deployed via GitHub Actions $(date +'%Y-%m-%d %H:%M')"
