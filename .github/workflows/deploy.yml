name: Deploy Apps Script (Python Normalized)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Action'
        required: true
        default: 'push_only'
        type: choice
        options: [push_only, push_and_deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Normalize & Inject Credentials
        env:
          # Pass the secret as an env var to the Python script
          CLASPRC_JSON_RAW: ${{ secrets.CLASPRC_JSON }}
        run: python scripts/setup_clasp.py

      - name: Verify Clasp Login
        run: npx clasp login --status

      - name: Push to Apps Script
        run: npm run push

      - name: Create New Deployment
        if: |
          github.event_name == 'push' || 
          (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_type == 'push_and_deploy')
        run: npm run deploy
